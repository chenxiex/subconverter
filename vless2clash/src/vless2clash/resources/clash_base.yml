dns:
  enable: true
  cache-algorithm: lru
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  ipv6: true
  enhanced-mode: redir-host
  default-nameserver:
    - tls://223.5.5.5:853
    - tls://1.12.12.12:853
    - system
  nameserver:
    - https://cloudflare-dns.com/dns-query#DNS&h3=true
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - tls://223.5.5.5:853
  direct-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - system

proxies: null
proxy-groups: null
rules: null
