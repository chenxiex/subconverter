# Based on ../../../../../base/base/all_base.tpl and the user's xray.json.
# Subscription nodes, proxy groups, rule providers, and routing rules are injected
# by vless2clash and intentionally do not live in this base configuration.

allow-lan: true
mode: rule
log-level: warning
ipv6: true
external-controller: 127.0.0.1:9090

# Preserve the three Xray mixed inbounds and their listen scopes.
listeners:
  - name: socks
    type: mixed
    listen: 127.0.0.1
    port: 10808
    udp: true
  - name: socks2
    type: mixed
    listen: 127.0.0.1
    port: 10809
    udp: true
  - name: socks3
    type: mixed
    listen: 0.0.0.0
    port: 10810
    udp: true

# Xray uses destOverride=[http,tls] with routeOnly=true. In Mihomo,
# override-destination=false keeps the same route-only behavior.
sniffer:
  enable: true
  force-dns-mapping: false
  parse-pure-ip: true
  override-destination: false
  sniff:
    HTTP:
      ports:
        - 0-65535
    TLS:
      ports:
        - 0-65535

# Static bootstrap records copied from xray.json's dns.hosts.
